name: Flutter CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      build_android_debug:
        description: Build an Android debug APK after checks pass
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: >-
          dart format --output=none --set-exit-if-changed
          lib test integration_test test_driver

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Android debug APK
        if: ${{ inputs.build_android_debug }}
        run: flutter build apk --debug
